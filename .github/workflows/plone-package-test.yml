name: Tests

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  black:
    runs-on: gha-runners-smartweb
    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4
    - name: Run check
      uses: IMIO/gha/code-analysis-notify@v7
      with:
        BASE_DIR: 'src'
        CHECK: 'black'
        PATH: |
          library/core

  test:
    runs-on: gha-runners-smartweb
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4
    - name: Run check
      uses: IMIO/gha/plone-package-test-notify@v7
      with:
        BUILDOUT_COMMAND: .venv/bin/buildout
        CACHE_KEY: eggs-test-${{ hashFiles('base.cfg') }}-python-${{ matrix.python-version }}
        INSTALL_DEPENDENCIES_COMMANDS: |
          uv venv --python ${{ matrix.python-version }} --managed-python
          uv pip install -r requirements.txt
        PYTHON_VERSION: ${{ matrix.python-version }}
        TEST_COMMAND: TZ=UTC bin/test

  coverage:
    runs-on: gha-runners-smartweb
    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4
    - name: Run check
      uses: IMIO/gha/plone-package-test-notify@v7
      with:
        BUILDOUT_COMMAND: .venv/bin/buildout
        CACHE_KEY: eggs-test-${{ hashFiles('base.cfg') }}-python-3.12
        TEST_COMMAND: TZ=UTC .venv/bin/coverage run bin/test
        INSTALL_DEPENDENCIES_COMMANDS: |
          uv venv --python 3.12 --managed-python
          uv pip install -r requirements-coverage.txt
        PYTHON_VERSION: 3.12
    - name: Submit to Coveralls
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: .venv/bin/coveralls --service=github
